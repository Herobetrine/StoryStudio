name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Node 20 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Check published documentation and package links
        run: npm run docs:check

      - name: Run test suite
        run: npm test

      - name: Run fixed quality gates
        run: npm run quality:check

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Verify release package
        run: npm pack --dry-run --json
